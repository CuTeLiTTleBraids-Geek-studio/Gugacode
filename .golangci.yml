# N-128: golangci-lint configuration. Excludes generated/vendored dirs
# that should not be linted.

run:
  timeout: 10m
  # Exclude generated Wails bindings, the build output directory, and
  # node_modules (which contains third-party Go files like flatted/golang).
  skip-dirs:
    - frontend/bindings
    - frontend/.bindings-tmp
    - frontend/node_modules
    - build
    - dist
    - tools
  skip-files:
    - ".*_bind\\.go$"

linters:
  # Enable a focused, stable set. Avoid style-only linters (gofmt, goimports)
  # that would produce noisy diffs on existing code — those are better
  # enforced via a formatter in a separate pass.
  enable:
    - errcheck        # unchecked errors
    - gosimple        # simplifications
    - govet           # `go vet` checks
    - ineffassign     # ineffectual assignments
    - staticcheck     # static analysis
    - typecheck       # type issues
    - unused          # unused code
    - misspell        # typos in comments/strings
    - unconvert       # unnecessary type conversions

linters-settings:
  errcheck:
    # Allow common Close/Write ignores in tests without explicit _ =.
    check-type-assertions: false
    check-blank: false
  staticcheck:
    # Use a reasonable checks set; ST1000 (missing package comment) is
    # noisy for a small project.
    checks: ["all", "-ST1000"]

issues:
  # Don't auto-exclude anything by default — be explicit about what we skip.
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    # Test files commonly ignore errors on purpose (e.g. _ = w.Write(...)).
    - path: _test\.go
      linters:
        - errcheck
    # The generated bindings directory is auto-generated by wails3.
    - path: frontend/bindings
      linters:
        - all
