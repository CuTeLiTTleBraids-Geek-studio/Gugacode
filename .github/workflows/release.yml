name: Release

# N-147: Tag-triggered release pipeline. When a version tag (v*.*.*) is
# pushed, this workflow builds production artifacts for Windows, Linux, and
# macOS, generates SHA256 checksums, and creates a GitHub Release with the
# artifacts attached. The CHANGELOG.md "Unreleased" section is used as the
# release notes body (no automated changelog generation — we keep a single
# hand-maintained CHANGELOG.md as the source of truth).
#
# Triggering:
#   git tag v0.2.0
#   git push origin v0.2.0
#
# Artifacts per platform:
#   Windows: gugacode-<version>-windows-amd64.zip
#   Linux:   gugacode-<version>-linux-amd64.tar.gz
#   macOS:   gugacode-<version>-darwin-amd64.zip
#            gugacode-<version>-darwin-arm64.zip
#
# Each artifact is hashed with SHA256; a single SHA256SUMS file is
# published alongside the artifacts.
#
# Code signing (MED-07 / G-SEC-08):
#   - Windows: Authenticode via signtool (requires WINDOWS_CERT_PFX +
#     WINDOWS_CERT_PASSWORD secrets). Missing secrets FAIL the release.
#   - macOS:   Developer ID codesign + notarytool notarization (requires
#     MACOS_CERT_P12 + MACOS_CERT_PASSWORD + APPLE_ID +
#     APPLE_APP_SPECIFIC_PASSWORD + APPLE_TEAM_ID secrets). Missing
#     secrets FAIL the release.
# A tag release must never publish unsigned artifacts — signing is
# mandatory, not opt-in.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }} / ${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: amd64
            artifact_name: gugacode-${{ github.ref_name }}-windows-amd64.zip
            build_cmd: wails3 build -tags desktop,production
          - os: ubuntu-latest
            arch: amd64
            artifact_name: gugacode-${{ github.ref_name }}-linux-amd64.tar.gz
            build_cmd: wails3 build -tags desktop,production
          - os: macos-latest
            arch: amd64
            artifact_name: gugacode-${{ github.ref_name }}-darwin-amd64.zip
            build_cmd: wails3 build -tags desktop,production
          - os: macos-latest
            arch: arm64
            artifact_name: gugacode-${{ github.ref_name }}-darwin-arm64.zip
            build_cmd: wails3 build -tags desktop,production
    runs-on: ${{ matrix.os }}
    env:
      # MED-07 / G-SEC-08: code-signing secrets. Required for tag releases —
      # missing secrets fail the build (see the verify step below).
      WINDOWS_CERT_PFX: ${{ secrets.WINDOWS_CERT_PFX }}
      WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
      MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
      MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4

      # MED-07: a tag release must never publish unsigned artifacts.
      # Fail fast when the signing secrets required for this platform are
      # missing, instead of silently producing an unsigned build.
      - name: Verify code-signing secrets (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          if [ -z "$WINDOWS_CERT_PFX" ] || [ -z "$WINDOWS_CERT_PASSWORD" ]; then
            echo "::error::Windows code-signing secrets (WINDOWS_CERT_PFX / WINDOWS_CERT_PASSWORD) are not configured. Tag releases must be signed."
            exit 1
          fi
          echo "Windows signing secrets present."

      - name: Verify code-signing secrets (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          if [ -z "$MACOS_CERT_P12" ] || [ -z "$MACOS_CERT_PASSWORD" ] || \
             [ -z "$APPLE_ID" ] || [ -z "$APPLE_APP_SPECIFIC_PASSWORD" ] || \
             [ -z "$APPLE_TEAM_ID" ]; then
            echo "::error::macOS code-signing secrets (MACOS_CERT_P12 / MACOS_CERT_PASSWORD / APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID) are not configured. Tag releases must be signed."
            exit 1
          fi
          echo "macOS signing secrets present."

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux GUI build deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev libgcc-12-dev libstdc++-12-dev pkg-config

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Install wails3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha2.111

      - name: Build
        run: ${{ matrix.build_cmd }}

      # MED-07 / G-SEC-08: Windows Authenticode signing. The verify step
      # above already ensures the certificate secret is present; this step
      # always runs on Windows tag releases. The certificate is stored
      # base64-encoded in the secret and decoded to a temp file here.
      - name: Code sign (Windows Authenticode)
        if: matrix.os == 'windows-latest' && env.WINDOWS_CERT_PFX != ''
        shell: pwsh
        run: |
          $pfxPath = "$env:RUNNER_TEMP\codesign.pfx"
          [System.Convert]::FromBase64String($env:WINDOWS_CERT_PFX) | Set-Content -Path $pfxPath -AsByteStream
          # Locate signtool.exe from the installed Windows SDK.
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" -ErrorAction SilentlyContinue | Sort-Object -Descending | Select-Object -First 1
          if (-not $signtool) { throw "signtool.exe not found in Windows SDK" }
          $exes = Get-ChildItem -Path bin -Filter "*.exe" -Recurse -ErrorAction SilentlyContinue
          foreach ($e in $exes) {
            & $signtool.FullName sign /f $pfxPath /p $env:WINDOWS_CERT_PASSWORD /fd sha256 /td sha256 /tr http://timestamp.digicert.com $e.FullName
          }
          Remove-Item $pfxPath -Force

      # MED-07 / G-SEC-08: macOS Developer ID signing + notarization. The
      # verify step above already ensures all Apple signing secrets are
      # present; this step always runs on macOS tag releases. Imports the
      # certificate into a temporary keychain, signs the .app bundle with
      # a hardened runtime, submits to Apple for notarization, then staples
      # the notarization ticket.
      - name: Code sign & notarize (macOS)
        if: matrix.os == 'macos-latest' && env.MACOS_CERT_P12 != ''
        shell: bash
        run: |
          set -euo pipefail
          p12_path="$RUNNER_TEMP/developer_id.p12"
          echo "$MACOS_CERT_P12" | base64 --decode > "$p12_path"
          keychain="build-$RANDOM.keychain"
          keychain_pw="$(openssl rand -hex 32)"
          security create-keychain -p "$keychain_pw" "$keychain"
          security default-keychain -s "$keychain"
          security unlock-keychain -p "$keychain_pw" "$keychain"
          security import "$p12_path" -k "$keychain" -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_pw" "$keychain"
          rm -f "$p12_path"
          APP_PATH="bin/gugacode.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "gugacode.app not found; skipping macOS signing"; exit 0
          fi
          # Sign with hardened runtime (required for notarization).
          codesign --force --deep --options runtime --sign "Developer ID Application" "$APP_PATH"
          # Verify the signature.
          codesign --verify --strict --verbose=2 "$APP_PATH"
          # Submit for notarization and wait for Apple's verdict.
          zip_path="$RUNNER_TEMP/gugacode-notarize.zip"
          ditto -c -k --keepParent "$APP_PATH" "$zip_path"
          xcrun notarytool submit "$zip_path" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          # Staple the notarization ticket to the app bundle.
          xcrun stapler staple "$APP_PATH"
          # Clean up the temporary keychain.
          security delete-keychain "$keychain"

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $artifacts = Get-ChildItem -Path bin -Filter "*.exe" -ErrorAction SilentlyContinue
          if (-not $artifacts) { $artifacts = Get-ChildItem -Path . -Filter "*gugacode*" -Recurse -ErrorAction SilentlyContinue | Where-Object { $_.Extension -eq ".exe" } }
          Compress-Archive -Path $artifacts.FullName -DestinationPath ${{ matrix.artifact_name }}

      - name: Package (Linux/macOS)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          # wails3 outputs to bin/. On macOS the product is a .app bundle;
          # on Linux it is a single executable. Handle both cases.
          if [ -d "bin/gugacode.app" ]; then
            # macOS: package the entire .app bundle
            tar -czf ${{ matrix.artifact_name }} -C bin gugacode.app
          else
            # Linux: package the single binary
            BINARY=$(find bin -maxdepth 1 -type f -name "*gugacode*" 2>/dev/null | head -1)
            if [ -z "$BINARY" ]; then
              echo "Build binary not found"; exit 1
            fi
            tar -czf ${{ matrix.artifact_name }} -C bin $(basename "$BINARY")
          fi

      - name: Generate SHA256 checksum
        shell: bash
        run: |
          sha256sum ${{ matrix.artifact_name }} > ${{ matrix.artifact_name }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_name }}
            ${{ matrix.artifact_name }}.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Consolidate SHA256SUMS
        shell: bash
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.zip" -o -name "*.tar.gz" \) -exec cp {} release-assets/ \;
          # Concatenate all .sha256 files into a single SHA256SUMS file.
          find artifacts -type f -name "*.sha256" -exec cat {} \; >> release-assets/SHA256SUMS
          # N-153: 将项目图标 icon.png 一并放入 release-assets，用户在
          # GitHub Release 下载页可直接看到并下载图标文件。
          if [ -f icon.png ]; then cp icon.png release-assets/icon.png; fi

      - name: Extract changelog for this version
        id: changelog
        shell: bash
        run: |
          # Extract the changelog section matching the released version
          # (e.g. tag v0.1.0 -> section "## [0.1.0]"). Falls back to the
          # [Unreleased] section if no matching version section is found.
          python3 - <<'PY'
          import os, re, pathlib
          md = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8")
          tag = os.environ.get("GITHUB_REF_NAME", "")
          version = tag.lstrip("v") if tag else ""
          body = ""
          if version:
              m = re.search(rf"## \[{re.escape(version)}\](.*?)(?=\n## \[|\Z)", md, re.S)
              if m:
                  body = m.group(1).strip()
          if not body:
              m = re.search(r"## \[Unreleased\](.*?)(?=\n## \[|\Z)", md, re.S)
              if m:
                  body = m.group(1).strip()
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"body<<EOF\n{body}\nEOF\n")
          PY

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          files: |
            release-assets/*
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
