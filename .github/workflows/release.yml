name: Release

# N-147: Tag-triggered release pipeline. When a version tag (v*.*.*) is
# pushed, this workflow builds production artifacts for Windows, Linux, and
# macOS, generates SHA256 checksums, and creates a GitHub Release with the
# artifacts attached. The CHANGELOG.md "Unreleased" section is used as the
# release notes body (no automated changelog generation — we keep a single
# hand-maintained CHANGELOG.md as the source of truth).
#
# Triggering:
#   git tag v0.2.0
#   git push origin v0.2.0
#
# Artifacts per platform:
#   Windows: gugacode-<version>-windows-amd64.zip
#   Linux:   gugacode-<version>-linux-amd64.tar.gz
#   macOS:   gugacode-<version>-darwin-amd64.zip
#            gugacode-<version>-darwin-arm64.zip
#
# Each artifact is hashed with SHA256; a single SHA256SUMS file is
# published alongside the artifacts and signed with the release GPG key
# if configured (via the RELEASE_GPG_KEY_ID secret — optional).

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }} / ${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: amd64
            artifact_name: gugacode-${{ github.ref_name }}-windows-amd64.zip
            build_cmd: wails3 build -tags desktop -production
          - os: ubuntu-latest
            arch: amd64
            artifact_name: gugacode-${{ github.ref_name }}-linux-amd64.tar.gz
            build_cmd: wails3 build -tags desktop -production
          - os: macos-latest
            arch: amd64
            artifact_name: gugacode-${{ github.ref_name }}-darwin-amd64.zip
            build_cmd: wails3 build -tags desktop -production
          - os: macos-latest
            arch: arm64
            artifact_name: gugacode-${{ github.ref_name }}-darwin-arm64.zip
            build_cmd: wails3 build -tags desktop -production
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux GUI build deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libgcc-12-dev libstdc++-12-dev pkg-config

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Install wails3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha2.111

      - name: Build
        run: ${{ matrix.build_cmd }}

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $artifacts = Get-ChildItem -Path bin -Filter "*.exe" -ErrorAction SilentlyContinue
          if (-not $artifacts) { $artifacts = Get-ChildItem -Path . -Filter "*gugacode*" -Recurse -ErrorAction SilentlyContinue | Where-Object { $_.Extension -eq ".exe" } }
          Compress-Archive -Path $artifacts.FullName -DestinationPath ${{ matrix.artifact_name }}

      - name: Package (Linux/macOS)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          # wails3 outputs to bin/. On macOS the product is a .app bundle;
          # on Linux it is a single executable. Handle both cases.
          if [ -d "bin/gugacode.app" ]; then
            # macOS: package the entire .app bundle
            tar -czf ${{ matrix.artifact_name }} -C bin gugacode.app
          else
            # Linux: package the single binary
            BINARY=$(find bin -maxdepth 1 -type f -name "*gugacode*" 2>/dev/null | head -1)
            if [ -z "$BINARY" ]; then
              echo "Build binary not found"; exit 1
            fi
            tar -czf ${{ matrix.artifact_name }} -C bin $(basename "$BINARY")
          fi

      - name: Generate SHA256 checksum
        shell: bash
        run: |
          sha256sum ${{ matrix.artifact_name }} > ${{ matrix.artifact_name }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_name }}
            ${{ matrix.artifact_name }}.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Consolidate SHA256SUMS
        shell: bash
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.zip" -o -name "*.tar.gz" \) -exec cp {} release-assets/ \;
          # Concatenate all .sha256 files into a single SHA256SUMS file.
          find artifacts -type f -name "*.sha256" -exec cat {} \; >> release-assets/SHA256SUMS
          # N-153: 将项目图标 icon.png 一并放入 release-assets，用户在
          # GitHub Release 下载页可直接看到并下载图标文件。
          if [ -f icon.png ]; then cp icon.png release-assets/icon.png; fi

      - name: Extract Unreleased changelog
        id: changelog
        shell: bash
        run: |
          # Extract the "## [Unreleased]" section from CHANGELOG.md as the
          # release notes body. Falls back to the tag name if not found.
          python3 - <<'PY'
          import os, re, pathlib
          md = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8")
          m = re.search(r"## \[Unreleased\](.*?)(?=\n## \[|\Z)", md, re.S)
          body = m.group(1).strip() if m else ""
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"body<<EOF\n{body}\nEOF\n")
          PY

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          files: |
            release-assets/*
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
